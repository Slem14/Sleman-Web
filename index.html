<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleman Parwiz</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0f14;
    color: #c9d1d9;
    font-family: "JetBrains Mono", monospace;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* subtle animated background */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 30%, rgba(88,166,255,0.05), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(230,57,70,0.05), transparent 40%);
    z-index: 0;
}

/* main card */
.card {
    position: relative;
    z-index: 1;
    background: rgba(13,17,23,0.85);
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 50px;
    width: 420px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* name */
h1 {
    font-size: 34px;
    color: white;
    margin-bottom: 10px;
}

/* typing line */
.typing {
    color: #58a6ff;
    margin-bottom: 25px;
    border-right: 2px solid #58a6ff;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 3s steps(30, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
    to { width: 100%; }
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* divider */
.divider {
    height: 1px;
    background: #21262d;
    margin: 20px 0;
}

/* links */
.links a {
    display: block;
    margin: 10px 0;
    color: #c9d1d9;
    text-decoration: none;
    padding: 10px;
    border-radius: 6px;
    transition: 0.25s;
}

.links a:hover {
    background: #161b22;
    color: #58a6ff;
    transform: translateX(5px);
}

/* footer text */
.footer {
    margin-top: 20px;
    font-size: 13px;
    color: #8b949e;
    line-height: 1.5;
}
</style>
</head>

<body>

<div class="card">

    <h1>Sleman Parwiz</h1>

    <div class="typing">
        Informatik @ Hochschule Anhalt
    </div>

    <div class="divider"></div>

    <div class="links">
        <a href="https://www.linkedin.com/in/sleman-parwiz-532541307/" target="_blank">→ LinkedIn</a>
        <a href="https://www.instagram.com/slem_1312" target="_blank">→ Instagram</a>
        <a href="https://x.com/Sleman_P" target="_blank">→ Twitter (X)</a>
    </div>

    <div class="footer">
        building skills, staying focused, chasing results.<br>
        consistency over hype.
    </div>

</div>

</body>
</html>
