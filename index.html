<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleman Parwiz</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: "Courier New", monospace;
    height: 100vh;
    overflow: hidden;
}

/* BACKGROUND GRID */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(#161b22 1px, transparent 1px),
                      linear-gradient(90deg, #161b22 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
}

/* CONTAINER */
.container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: rgba(22, 27, 34, 0.85);
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 50px;
    width: 400px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* TITLE */
h1 {
    font-size: 32px;
    margin-bottom: 10px;
    color: white;
}

/* TYPING EFFECT */
.typing {
    color: #58a6ff;
    margin-bottom: 25px;
    border-right: 2px solid #58a6ff;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 3s steps(30, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
    to { width: 100%; }
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* LINKS */
.links a {
    display: block;
    margin: 12px 0;
    color: #c9d1d9;
    text-decoration: none;
    transition: 0.3s;
    padding: 8px;
    border-radius: 6px;
}

.links a:hover {
    background: #21262d;
    color: #58a6ff;
    transform: translateX(5px);
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #8b949e;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>Sleman Parwiz</h1>

        <div class="typing">
            Informatik Student @ Hochschule Anhalt
        </div>

        <div class="links">
            <a href="https://www.linkedin.com/in/sleman-parwiz-532541307/" target="_blank">→ LinkedIn</a>
            <a href="https://www.instagram.com/slem_1312" target="_blank">→ Instagram</a>
            <a href="https://x.com/Sleman_P" target="_blank">→ Twitter (X)</a>
        </div>

        <div class="footer">
            > building things & learning systems
        </div>

    </div>
</div>

</body>
</html>
